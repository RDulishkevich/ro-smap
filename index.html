<!DOCTYPE html>
<html lang="ru" class="light" style="font-size: 16px;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Аудиокарта Ростовской области</title>
    
    <!-- Tailwind CSS & Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    
    <!-- API Яндекс Карт -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=ваш_api_ключ_яндекс&lang=ru_RU" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
        }

        /* Кастомный скроллбар с поддержкой тёмной темы */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        [class*="gototech"] { display: none !important; }

        /* Маркеры */
        .custom-marker {
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .dark .custom-marker { border-color: #1e293b; }
        .custom-marker.selected {
            transform: scale(1.3);
            z-index: 1000 !important;
            border-color: #0f172a;
        }
        .dark .custom-marker.selected { border-color: #f8fafc; }
        
        .marker-nature { background-color: #22c55e; }
        .marker-industrial { background-color: #3b82f6; }
        .marker-social { background-color: #f97316; }

        /* Кастомные стили для инпутов в модальных окнах */
        .modal-input {
            width: 100%;
            border-radius: 0.75rem;
            padding: 0.625rem 1rem;
            font-size: 0.875rem;
            outline: none;
            transition: all 0.2s;
        }
        .modal-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-100 antialiased transition-colors duration-300">

    <!-- Карта -->
    <div id="map" class="absolute inset-0 z-0"></div>

    <!-- Кнопка вызова сайдбара (бургер) -->
    <button id="sidebar-toggle-btn" onclick="toggleSidebar()" class="absolute top-4 left-4 md:top-6 md:left-6 z-20 w-12 h-12 bg-white/95 dark:bg-slate-800/95 backdrop-blur-xl rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700 flex items-center justify-center text-slate-800 dark:text-slate-100 hover:scale-105 active:scale-95 transition-all">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <!-- Плавающие кнопки справа -->
    <div class="absolute top-4 right-4 md:top-auto md:bottom-6 md:right-6 z-20 flex flex-col gap-3 pointer-events-auto">
        <button onclick="toggleAddModal()" class="w-12 h-12 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 rounded-2xl flex items-center justify-center shadow-xl border border-slate-100 dark:border-slate-700 hover:scale-105 active:scale-95 transition-all" title="Add Audio">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button onclick="toggleGameModal()" class="w-12 h-12 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 rounded-2xl flex items-center justify-center shadow-xl border border-slate-100 dark:border-slate-700 hover:scale-105 active:scale-95 transition-all" title="Game">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4"/><path d="M8 10v4"/><path d="M15 13h.01"/><path d="M18 11h.01"/></svg>
        </button>
        <button onclick="toggleSettingsModal()" class="w-12 h-12 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 rounded-2xl flex items-center justify-center shadow-xl border border-slate-100 dark:border-slate-700 hover:scale-105 active:scale-95 transition-all" title="Settings">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H4a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V4a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H20a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
    </div>

    <!-- Левая панель (Сайдбар) -->
    <div id="sidebar" class="absolute top-4 left-4 bottom-4 w-[calc(100%-2rem)] md:w-[24rem] bg-white/95 dark:bg-slate-800/95 backdrop-blur-xl rounded-[2rem] shadow-2xl flex flex-col z-30 border border-slate-100 dark:border-slate-700/50 transition-transform duration-400 ease-in-out -translate-x-[120%] pointer-events-auto">

        <div class="p-6 pb-4 border-b border-slate-100 dark:border-slate-700/50">
            <div class="flex justify-between items-start mb-1">
                <h1 class="text-2xl font-bold tracking-tight text-slate-800 dark:text-white" data-lang="title">Ростовская область</h1>
                <button onclick="toggleSidebar()" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <p class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-5" data-lang="subtitle">Audio Map</p>
            
            <div class="relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="search-input" data-lang-placeholder="search_placeholder" placeholder="Поиск звуков..." class="w-full bg-slate-100 dark:bg-slate-900 border border-transparent dark:border-slate-700 rounded-xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800 dark:text-white">
            </div>
        </div>

        <div class="px-6 py-3 border-b border-slate-100 dark:border-slate-700/50 overflow-x-auto hide-scrollbar flex gap-2 flex-shrink-0">
            <button onclick="setFilter('all')" id="filter-all" class="filter-btn px-4 py-1.5 rounded-full text-xs font-semibold bg-slate-800 dark:bg-blue-600 text-white transition-colors shadow-md" data-lang="filter_all">All</button>
            <button onclick="setFilter('nature')" id="filter-nature" class="filter-btn px-4 py-1.5 rounded-full text-xs font-semibold bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors" data-lang="filter_nature">Nature</button>
            <button onclick="setFilter('industrial')" id="filter-industrial" class="filter-btn px-4 py-1.5 rounded-full text-xs font-semibold bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors" data-lang="filter_industrial">Industrial</button>
            <button onclick="setFilter('social')" id="filter-social" class="filter-btn px-4 py-1.5 rounded-full text-xs font-semibold bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors" data-lang="filter_social">Social</button>
        </div>

        <div id="sounds-list" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2"></div>
    </div>

    <!-- Всплывающий Плеер -->
    <div id="player-card" class="absolute bottom-[calc(env(safe-area-inset-bottom)+1rem)] left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] md:w-[26rem] bg-white dark:bg-slate-800 rounded-[2rem] shadow-[0_-10px_50px_rgba(0,0,0,0.15)] dark:shadow-[0_-10px_50px_rgba(0,0,0,0.5)] p-5 md:p-6 border border-slate-50 dark:border-slate-700 z-40 transition-transform duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)] translate-y-[200%] pointer-events-auto">
        
        <!-- Drag Handle для закрытия -->
        <div onclick="closePlayerCard()" class="absolute top-0 left-0 right-0 h-8 flex justify-center items-center cursor-pointer z-50">
            <div class="w-10 h-1 bg-slate-200 dark:bg-slate-600 rounded-full hover:bg-slate-300 dark:hover:bg-slate-500 transition-colors mt-1"></div>
        </div>

        <!-- Осциллограмма (Waveform) -->
        <div id="waveform-wrapper" class="relative w-full h-14 cursor-pointer group mb-2 mt-2">
            <div id="waveform-bg" class="absolute inset-0 flex items-center justify-between gap-[2px] text-slate-100 dark:text-slate-700"></div>
            <div id="waveform-active" class="absolute inset-0 flex items-center justify-between gap-[2px] text-slate-800 dark:text-blue-500 pointer-events-none" style="clip-path: inset(0 100% 0 0);"></div>
            <div id="playhead" class="absolute top-0 bottom-0 w-[2px] bg-slate-400 dark:bg-blue-400 rounded-full pointer-events-none z-10 shadow-[0_0_4px_rgba(0,0,0,0.2)]" style="left: 0%;"></div>
            <input type="range" id="audio-timeline" min="0" max="100" value="0" step="0.01" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-30 m-0" oninput="seekAudio(this.value)">
        </div>
        
        <!-- Время -->
        <div class="flex justify-between text-[11px] font-semibold text-slate-800 dark:text-slate-200 mb-4 px-1">
            <div>
                <span id="time-current">0:00</span>
                <span class="text-slate-300 dark:text-slate-600 mx-1">/</span>
                <span id="time-total" class="text-slate-400 dark:text-slate-500">0:00</span>
            </div>
            <span id="time-total-right" class="text-slate-400 dark:text-slate-500">0:00</span>
        </div>

        <!-- Блок управления и информации -->
        <div class="flex items-center gap-4">
            <button id="main-play-btn" onclick="toggleMainPlay()" class="w-12 h-12 bg-[#1e293b] dark:bg-blue-600 text-white rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-md flex-shrink-0">
                <svg id="main-play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" class="translate-x-0.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                <svg id="main-pause-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" class="hidden"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            
            <div class="flex-grow min-w-0 text-left">
                <div class="flex items-center mb-1 gap-1">
                    <h2 id="player-title" onclick="openDetailsModal()" class="text-sm font-bold text-slate-800 dark:text-white cursor-pointer hover:text-blue-600 dark:hover:text-blue-400 transition-colors truncate">Название трека</h2>
                    <button onclick="openDetailsModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 flex-shrink-0">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                    </button>
                </div>
                <div id="player-tags" class="flex flex-wrap gap-1.5 mb-1"></div>
                <p id="player-gear" class="text-[10px] text-slate-500 dark:text-slate-400 font-medium truncate">Rec: ...</p>
            </div>
        </div>
    </div>

    <!-- Модальное окно Игры (Game) -->
    <div id="game-modal" class="fixed inset-0 z-[110] bg-slate-900/60 dark:bg-slate-900/80 backdrop-blur-sm hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300 pointer-events-none">
        <div id="game-modal-content" class="bg-white dark:bg-slate-800 rounded-[2rem] shadow-2xl w-full max-w-sm flex flex-col overflow-hidden transform scale-95 transition-all pointer-events-auto">
            <div class="px-6 py-5 flex justify-between items-center border-b border-slate-100 dark:border-slate-700">
                <h3 class="text-lg font-bold text-slate-800 dark:text-white" data-lang="game_title">Голосовой платформер</h3>
                <button onclick="toggleGameModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            
            <div class="p-6 flex flex-col items-center gap-5">
                <p class="text-slate-500 dark:text-slate-400 text-sm text-center" data-lang="game_desc">Крикните или хлопните в микрофон, чтобы перепрыгнуть препятствие!</p>
                <p class="text-3xl font-black text-blue-600 dark:text-blue-400"><span data-lang="game_score">Счет: </span> <span id="game-score-val">0</span></p>
                
                <!-- Игровой холст -->
                <div class="relative w-full h-40 bg-slate-100 dark:bg-slate-700 rounded-2xl overflow-hidden shadow-inner border border-slate-200 dark:border-slate-600">
                    <canvas id="game-canvas" class="w-full h-full block"></canvas>
                    
                    <!-- Экран проигрыша -->
                    <div id="game-over-screen" class="absolute inset-0 bg-slate-900/80 hidden flex-col items-center justify-center text-white z-10 backdrop-blur-sm">
                        <p class="text-xl font-bold mb-3 uppercase tracking-widest text-red-400">Game Over</p>
                        <button onclick="resetGame()" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 rounded-xl font-semibold shadow-md transition-colors" data-lang="game_restart">Рестарт</button>
                    </div>
                </div>

                <!-- Индикатор громкости микрофона -->
                <div class="w-full space-y-1">
                    <div class="flex justify-between text-[10px] text-slate-400 font-bold px-1">
                        <span>MIC LEVEL</span>
                        <span>JUMP THRESHOLD</span>
                    </div>
                    <div class="w-full h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden relative">
                        <div id="mic-level-bar" class="h-full bg-blue-500 w-0 transition-all duration-75"></div>
                        <!-- Риска порога прыжка -->
                        <div class="absolute top-0 bottom-0 w-0.5 bg-red-500 z-10" style="left: 45%;"></div>
                    </div>
                </div>

                <button id="game-start-btn" onclick="toggleGamePlaying()" class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all shadow-md active:scale-[0.98]" data-lang="game_start">Начать игру</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно Настроек -->
    <div id="settings-modal" class="fixed inset-0 z-[100] bg-slate-900/60 dark:bg-slate-900/80 backdrop-blur-sm hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300 pointer-events-none">
        <div id="settings-modal-content" class="bg-white dark:bg-slate-800 rounded-[2rem] shadow-2xl w-full max-w-sm flex flex-col overflow-hidden transform scale-95 transition-all pointer-events-auto">
            <div class="px-6 py-5 flex justify-between items-center border-b border-slate-100 dark:border-slate-700">
                <h3 class="text-lg font-bold text-slate-800 dark:text-white" data-lang="settings_title">Настройки</h3>
                <button onclick="toggleSettingsModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            
            <div class="p-6 space-y-6">
                <!-- Масштаб -->
                <div>
                    <label class="modal-label text-slate-500 dark:text-slate-400" data-lang="gui_scale">Масштаб интерфейса</label>
                    <div class="grid grid-cols-3 gap-2" id="scale-buttons">
                        <button data-scale="small" onclick="changeGUISize('small')" class="p-2.5 text-xs font-bold bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Small</button>
                        <button data-scale="medium" onclick="changeGUISize('medium')" class="p-2.5 text-xs font-bold bg-blue-600 text-white rounded-xl transition-all shadow-md">Medium</button>
                        <button data-scale="large" onclick="changeGUISize('large')" class="p-2.5 text-xs font-bold bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Large</button>
                    </div>
                </div>

                <!-- Тема -->
                <div>
                    <label class="modal-label text-slate-500 dark:text-slate-400" data-lang="theme">Тема оформления</label>
                    <div class="flex items-center gap-2 p-1.5 bg-slate-100 dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-700">
                        <button onclick="setTheme('light')" id="theme-light-btn" class="flex-1 py-2 text-xs font-bold bg-white dark:bg-transparent text-slate-800 dark:text-slate-400 shadow-sm dark:shadow-none rounded-lg transition-all">Light</button>
                        <button onclick="setTheme('dark')" id="theme-dark-btn" class="flex-1 py-2 text-xs font-bold bg-transparent dark:bg-slate-700 text-slate-500 dark:text-white shadow-none dark:shadow-sm rounded-lg transition-all">Dark</button>
                    </div>
                </div>

                <!-- Язык -->
                <div>
                    <label class="modal-label text-slate-500 dark:text-slate-400" data-lang="language">Язык приложения</label>
                    <div class="relative">
                        <select onchange="setLanguage(this.value)" id="lang-select" class="modal-input bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white font-semibold appearance-none cursor-pointer">
                            <option value="ru">🇷🇺 Русский</option>
                            <option value="en">🇬🇧 English</option>
                        </select>
                        <svg class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                </div>
            </div>
            
            <div class="p-6 pt-0">
                <button onclick="toggleSettingsModal()" class="w-full py-3.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-800 dark:text-white font-bold rounded-xl transition-all" data-lang="close">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно ADD AUDIO -->
    <div id="add-modal" class="fixed inset-0 z-[100] bg-slate-900/60 dark:bg-slate-900/80 backdrop-blur-sm hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300 pointer-events-none">
        <div id="add-modal-content" class="bg-slate-50 dark:bg-slate-900 rounded-[2.5rem] shadow-2xl w-full max-w-lg max-h-[92vh] flex flex-col overflow-hidden transform scale-95 transition-all border border-slate-100 dark:border-slate-800 pointer-events-auto">
            
            <div class="px-6 py-5 flex justify-between items-center bg-white dark:bg-slate-800 border-b border-slate-100 dark:border-slate-700">
                <h3 class="text-xl font-bold text-slate-800 dark:text-white" data-lang="add_audio_title">Add Audio</h3>
                <button onclick="toggleAddModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <div class="p-6 overflow-y-auto custom-scrollbar flex flex-col gap-5">
                <div class="bg-white dark:bg-slate-800 border-2 border-dashed border-slate-200 dark:border-slate-600 rounded-2xl p-6 flex flex-col items-center justify-center text-center cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
                    <div class="flex items-center gap-2 text-slate-500 dark:text-slate-400 mb-3">

        let map, currentFilter = 'all', currentPlayingId = null, isPlaying = false, animationFrameId = null, currentLang = 'ru', currentTheme = 'light';

            }

        // Инициализация Canvas
        function initGameContext() {
            gameCanvas = document.getElementById('game-canvas');
            // Устанавливаем внутреннее разрешение canvas равным его размеру на экране
            gameCanvas.width = gameCanvas.offsetWidth;
            gameCanvas.height = gameCanvas.offsetHeight;
            ctx = gameCanvas.getContext('2d');
            resetGameParams();
        }

        function resetGameParams() {
            player.y = gameCanvas.height - player.h - 10;
            player.vy = 0;
            player.isGrounded = true;
            obstacles = [];
            frames = 0;
            gameScore = 0;
            isGameOver = false;
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('game-score-val').textContent = '0';
        }

        function resetGame() {
            resetGameParams();
        }

        // Логика запуска игры платформера
        async function toggleGamePlaying() {
            if (gameActive) {
                // Остановка игры
                gameActive = false;
                cancelAnimationFrame(gameLoopId);
                if (micStream) micStream.getTracks().forEach(t => t.stop());
                if (audioCtx) audioCtx.close();
                document.getElementById('game-start-btn').textContent = translations[currentLang].game_start;
                document.getElementById('mic-level-bar').style.width = '0%';
            } else {
                // Старт игры
                try {
                    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioCtx.createAnalyser();
                    const source = audioCtx.createMediaStreamSource(micStream);
                    source.connect(analyser);
                    analyser.fftSize = 256;
                    
                    initGameContext();
                    gameActive = true;
                    document.getElementById('game-start-btn').textContent = translations[currentLang].game_stop;
                    gameLoop();
                } catch (err) {
                    alert("Доступ к микрофону запрещен или недоступен.");
                }
            }
        }

        function gameLoop() {
            if (!gameActive) return;
            
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for(let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            let average = sum / dataArray.length;
            
            // Визуальный индикатор микрофона (в процентах, максимум 100)
            let micPercent = Math.min(100, (average / 100) * 100);
            document.getElementById('mic-level-bar').style.width = micPercent + '%';
            
            if (!isGameOver) {
                // ПРЫЖОК: Если громкость выше порога (45) и игрок на земле
                if (micPercent > 45 && player.isGrounded) {
                    player.vy = player.jumpPower;
                    player.isGrounded = false;
                }

                // Физика
                player.vy += player.gravity;
                player.y += player.vy;

                // Столкновение с землей
                const groundY = gameCanvas.height - 10;
                if (player.y + player.h >= groundY) {
                    player.y = groundY - player.h;
                    player.vy = 0;
                    player.isGrounded = true;
                }

                // Спавн препятствий (каждые ~1.5 секунды)
                if (frames % 90 === 0) {
                    let obsW = 15 + Math.random() * 10;
                    let obsH = 20 + Math.random() * 15;
                    obstacles.push({
                        x: gameCanvas.width,
                        y: groundY - obsH,
                        w: obsW,
                        h: obsH,
                        speed: 3 + Math.random() * 2,
                        passed: false
                    });
                }

                // Обновление препятствий
                for (let i = 0; i < obstacles.length; i++) {
                    let obs = obstacles[i];
                    obs.x -= obs.speed;

                    // Проверка столкновений
                    if (
                        player.x < obs.x + obs.w &&
                        player.x + player.w > obs.x &&
                        player.y < obs.y + obs.h &&
                        player.y + player.h > obs.y
                    ) {
                        isGameOver = true;
                        document.getElementById('game-over-screen').classList.remove('hidden');
                        document.getElementById('game-over-screen').classList.add('flex');
                    }

                    // Подсчет очков
                    if (obs.x + obs.w < player.x && !obs.passed) {
                        obs.passed = true;
                        gameScore += 10;
                        document.getElementById('game-score-val').textContent = gameScore;
                    }
                }

                // Удаление ушедших за экран препятствий
                obstacles = obstacles.filter(obs => obs.x + obs.w > 0);

                frames++;
            }
            
            // --- Отрисовка ---
            ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);

            // Земля
            ctx.fillStyle = currentTheme === 'dark' ? '#334155' : '#cbd5e1';
            ctx.fillRect(0, gameCanvas.height - 10, gameCanvas.width, 10);

            // Игрок
            ctx.fillStyle = '#3b82f6'; // Синий
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Препятствия
            ctx.fillStyle = '#ef4444'; // Красный
            for (let obs of obstacles) {
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            }
            
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function updateMapMarkers(searchQuery = '') {
            if (!map) return;
            map.geoObjects.removeAll();
            const createMarkerLayout = (colorClass, id) => ymaps.templateLayoutFactory.createClass(`<div id="marker-${id}" class="w-4 h-4 md:w-5 md:h-5 custom-marker ${colorClass} ${currentPlayingId === id ? 'selected' : ''}"></div>`);
            soundsData.forEach(sound => {
                if (currentFilter !== 'all' && sound.category !== currentFilter) return;
                if (searchQuery && !sound.title.toLowerCase().includes(searchQuery)) return;
                let colorClass = sound.category === 'nature' ? 'marker-nature' : sound.category === 'industrial' ? 'marker-industrial' : 'marker-social';
                const p = new ymaps.Placemark([sound.lat, sound.lng], {}, { iconLayout: createMarkerLayout(colorClass, sound.id), iconShape: { type: 'Rectangle', coordinates: [[-10, -10], [10, 10]] }, iconOffset: [-10, -10] });
                p.events.add('click', () => selectSound(sound.id));
                map.geoObjects.add(p);
            });
        }

        function renderList(searchQuery = '') {
            const listContainer = document.getElementById('sounds-list');
            listContainer.innerHTML = '';
            const filtered = soundsData.filter(s => (currentFilter === 'all' || s.category === currentFilter) && (!searchQuery || s.title.toLowerCase().includes(searchQuery)));
            filtered.forEach(sound => {
                const item = document.createElement('div');
                const isSelected = currentPlayingId === sound.id;
                item.className = `p-3 rounded-2xl border transition-all cursor-pointer flex items-center gap-3 group ${isSelected ? 'bg-slate-50 dark:bg-slate-700/50 border-slate-300 dark:border-slate-500 shadow-sm' : 'bg-white dark:bg-slate-800 border-slate-100 dark:border-slate-700 hover:border-slate-200 dark:hover:border-slate-600'}`;
                item.onclick = () => selectSound(sound.id);
                item.innerHTML = `
                    <button class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 transition-colors ${isSelected && isPlaying ? 'bg-blue-600 text-white' : 'bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300'}">
                        ${isSelected && isPlaying ? '<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>' : '<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>'}
                    </button>
                    <div class="flex-grow min-w-0 text-left">
                        <h3 class="font-semibold text-[13px] truncate text-slate-800 dark:text-white">${sound.title}</h3>
                        <p class="text-[9px] text-slate-400 dark:text-slate-500 mt-0.5 truncate uppercase tracking-wider font-bold">${translations[currentLang][`filter_${sound.category}`]}</p>
                    </div>`;
                listContainer.appendChild(item);
            });
        }

        function selectSound(id) {
            const s = soundsData.find(x => x.id === id);
            
            if (window.innerWidth < 768) { 
                const sb = document.getElementById('sidebar'); 
                if (!sb.classList.contains('sidebar-hidden')) toggleSidebar(); 
            }
            
            map.setCenter([s.lat, s.lng], 15, { duration: 1000 });
            currentPlayingId = id; 
            updateMapMarkers(document.getElementById('search-input').value.toLowerCase());
            
            const card = document.getElementById('player-card');
            card.classList.remove('translate-y-[200%]', 'opacity-0');
            
            document.getElementById('player-title').textContent = s.title;
            document.getElementById('player-gear').textContent = translations[currentLang].rec_prefix + s.gear;
            document.getElementById('player-tags').innerHTML = `
                <span class="tag-pill border-blue-200 dark:border-blue-800 text-blue-700 dark:text-blue-300 bg-blue-50 dark:bg-blue-900/30">${s.typeTag}</span>
                <span class="tag-pill border-orange-200 dark:border-orange-800 text-orange-700 dark:text-orange-300 bg-orange-50 dark:bg-orange-900/30">${s.semanticTag}</span>
            `;
            
            if (audioElement.src !== s.url) { 
                audioElement.src = s.url; 
                audioElement.play().then(() => { isPlaying = true; startTimelineAnimation(); updateUIState(); }).catch(() => { isPlaying = false; updateUIState(); }); 
            } else { 
                toggleMainPlay(); 
            }
        }

        function closePlayerCard() {
            if (isPlaying) { audioElement.pause(); isPlaying = false; cancelAnimationFrame(animationFrameId); }
            const card = document.getElementById('player-card');
            card.classList.add('translate-y-[200%]', 'opacity-0');
            currentPlayingId = null; 
            updateMapMarkers(); 
            renderList(document.getElementById('search-input').value.toLowerCase());

        function toggleMainPlay() {
            if (!currentPlayingId) return;
            if (isPlaying) { audioElement.pause(); isPlaying = false; cancelAnimationFrame(animationFrameId); }
            else { audioElement.play().then(() => { isPlaying = true; startTimelineAnimation(); }); }
            updateUIState();
        }

        function updateUIState() {
            const p = document.getElementById('main-play-icon'), s = document.getElementById('main-pause-icon');
            if (isPlaying) { p.classList.add('hidden'); s.classList.remove('hidden'); }
            else { p.classList.remove('hidden'); s.classList.add('hidden'); }
            renderList(document.getElementById('search-input').value.toLowerCase());
        }

        function renderWaveform() {
            const data = [15, 25, 45, 20, 60, 40, 80, 55, 30, 15, 40, 70, 90, 50, 35, 20, 25, 45, 65, 85, 55, 35, 20, 25, 45, 65, 10, 35, 55, 75, 15, 40, 60, 35, 15, 50, 70, 90, 55, 30, 25, 45, 75, 85];
            let h = ''; data.forEach(v => h += `<div class="flex-1 bg-current rounded-full" style="height: ${v}%;"></div>`);
            document.getElementById('waveform-bg').innerHTML = h; document.getElementById('waveform-active').innerHTML = h;
        }

        function startTimelineAnimation() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            const a = () => { 
                if (!isPlaying) return; 
                const r = audioElement.currentTime / (audioElement.duration || 1); 
                document.getElementById('time-current').textContent = formatTime(audioElement.currentTime); 
                document.getElementById('waveform-active').style.clipPath = `inset(0 ${100 - r * 100}% 0 0)`; 
                document.getElementById('playhead').style.left = `${r * 100}%`; 
                animationFrameId = requestAnimationFrame(a); 
            };
            a();
        }

        function seekAudio(v) { 
            if (audioElement.duration) { 
                audioElement.currentTime = (v / 100) * audioElement.duration; 
                if (!isPlaying) {
                    const ratio = v / 100;
                    document.getElementById('waveform-active').style.clipPath = `inset(0 ${100 - ratio * 100}% 0 0)`;
                    document.getElementById('playhead').style.left = `${ratio * 100}%`;
                    document.getElementById('time-current').textContent = formatTime(audioElement.currentTime);
                }
            } 
        }
        
        function formatTime(s) { const m = Math.floor(s / 60), sec = Math.floor(s % 60); return `${m}:${sec < 10 ? '0' : ''}${sec}`; }
        
        function setupAudioEvents() { 
            audioElement.onended = () => { isPlaying = false; updateUIState(); }; 
            audioElement.onloadedmetadata = () => { 
                document.getElementById('time-total').textContent = formatTime(audioElement.duration); 
                document.getElementById('time-total-right').textContent = formatTime(audioElement.duration); 
            }; 
        }

        function setFilter(t) { 
            currentFilter = t; 
            document.querySelectorAll('.filter-btn').forEach(b => {
                if (b.id === `filter-${t}`) {
                    b.classList.add('bg-slate-800', 'dark:bg-blue-600', 'text-white', 'shadow-md');
                    b.classList.remove('bg-slate-100', 'dark:bg-slate-700', 'text-slate-600', 'dark:text-slate-300');
                } else {
                    b.classList.remove('bg-slate-800', 'dark:bg-blue-600', 'text-white', 'shadow-md');
                    b.classList.add('bg-slate-100', 'dark:bg-slate-700', 'text-slate-600', 'dark:text-slate-300');
                }
            }); 
            updateMapMarkers(document.getElementById('search-input').value.toLowerCase()); 
            renderList(document.getElementById('search-input').value.toLowerCase()); 
        }

        function openDetailsModal() {
            const s = soundsData.find(x => x.id === currentPlayingId); if (!s) return;
            document.getElementById('details-image').src = `https://picsum.photos/seed/${s.id}/800/500`;
            document.getElementById('details-title').textContent = s.title; 
            document.getElementById('details-date').textContent = s.date; 
            document.getElementById('details-description').textContent = s.description;
            document.getElementById('details-coords').textContent = translations[currentLang].coords_prefix + `${s.lat.toFixed(4)}, ${s.lng.toFixed(4)}`;
            document.getElementById('details-gear').textContent = translations[currentLang].gear_prefix + s.gear;
            
            let cColor = s.category === 'nature' ? 'text-green-700 border-green-200 bg-green-50' : s.category === 'industrial' ? 'text-blue-700 border-blue-200 bg-blue-50' : 'text-orange-700 border-orange-200 bg-orange-50';
            
            document.getElementById('details-tags-container').innerHTML = `
                <span class="tag-pill ${cColor} uppercase dark:bg-transparent dark:border-slate-600 dark:text-slate-300">${translations[currentLang][`filter_${s.category}`]}</span>
            `;
            
            const m = document.getElementById('details-modal'); 
            const c = document.getElementById('details-modal-content');
            m.classList.remove('hidden'); 
            setTimeout(() => { m.classList.remove('opacity-0'); c.classList.remove('scale-95'); }, 10);
        }

        function closeDetailsModal() { 
            const m = document.getElementById('details-modal'); 
            const c = document.getElementById('details-modal-content');
            m.classList.add('opacity-0'); 
            c.classList.add('scale-95');
            setTimeout(() => m.classList.add('hidden'), 300); 
        }
    </script>
</body>
</html>
