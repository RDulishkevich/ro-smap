<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Аудиокарта Ростовской области</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- API Яндекс Карт (без светлых тем и фильтров) -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=ваш_api_ключ_яндекс&lang=ru_RU" type="text/javascript"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Запрещаем прокрутку страницы, карта занимает весь экран */
        }

        /* Кастомный скроллбар для списка */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Скрытие логотипа Яндекса для чистоты дизайна (опционально) */
        [class*="gototech"] { display: none !important; }

        /* Маркеры на карте */
        .custom-marker {
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .custom-marker:hover, .custom-marker.selected {
            transform: scale(1.3);
            z-index: 1000 !important;
        }
        .marker-nature { background-color: #22c55e; } /* Green */
        .marker-industrial { background-color: #3b82f6; } /* Blue */
        .marker-social { background-color: #f97316; } /* Orange */

        /* Класс для плавного скрытия боковой панели */
        .sidebar-hidden {
            transform: translateX(-120%);
            opacity: 0;
            position: absolute !important;
            pointer-events: none;
        }
    </style>
</head>
<body class="text-slate-800 antialiased h-screen w-screen relative">

    <!-- Контейнер для карты -->
    <div id="map" class="absolute inset-0 z-0 bg-[#f0f4f8]"></div>

    <!-- UI Поверх карты -->
    <div class="absolute inset-0 pointer-events-none z-10 flex flex-col md:flex-row p-4 md:p-6 gap-4 overflow-hidden">
        
        <!-- Кнопка открытия панели (бургер), появляется когда панель скрыта -->
        <button id="sidebar-toggle-btn" onclick="toggleSidebar()" class="absolute top-4 left-4 md:top-6 md:left-6 z-20 w-12 h-12 bg-white/95 backdrop-blur-xl rounded-2xl shadow-xl border border-slate-100 flex items-center justify-center text-slate-800 hover:bg-slate-50 transition-all hidden cursor-pointer pointer-events-auto">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <!-- Левая панель (Список и фильтры) -->
        <div id="sidebar" class="pointer-events-auto relative w-full md:w-[400px] bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl flex flex-col h-[55vh] md:h-full flex-shrink-0 border border-slate-100 overflow-hidden transition-all duration-300 ease-in-out origin-left z-30">

            <!-- Заголовок и поиск -->
            <div class="p-6 pb-4">
                <div class="flex justify-between items-start mb-1">
                    <h1 class="text-2xl font-bold tracking-tight">Ростовская область</h1>
                    
                    <div class="flex items-center gap-3">
                        <!-- Выбор масштаба (GUI Size) -->
                        <div class="hidden md:flex flex-col items-end">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">GUI Size</label>
                            <select onchange="changeGUISize(this.value)" class="text-xs bg-slate-100 border border-slate-200 rounded-lg px-2 py-1.5 text-slate-600 focus:ring-2 focus:ring-slate-300 focus:outline-none cursor-pointer hover:bg-slate-200 transition-colors">
                                <option value="small">Small</option>
                                <option value="medium" selected>Medium</option>
                                <option value="large">Large</option>
                            </select>
                        </div>
                        
                        <!-- Кнопка закрытия панели -->
                        <button onclick="toggleSidebar()" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-slate-800 transition-colors pointer-events-auto" title="Hide Sidebar">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                </div>
                <p class="text-slate-500 font-medium mb-5">Audio Map</p>
                
                <div class="relative">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" id="search-input" placeholder="Search sounds, locations, or tags..." class="w-full bg-slate-100 rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-slate-300 transition-all">
                </div>
            </div>

            <!-- Фильтры -->
            <div class="px-6 pb-2 overflow-x-auto whitespace-nowrap hide-scrollbar flex gap-2">
                <button onclick="setFilter('all')" id="filter-all" class="filter-btn active-filter px-4 py-1.5 rounded-full text-sm font-medium border border-slate-200 bg-slate-800 text-white transition-colors">All</button>
                <button onclick="setFilter('nature')" id="filter-nature" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition-colors">Nature</button>
                <button onclick="setFilter('industrial')" id="filter-industrial" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition-colors">Industrial</button>
                <button onclick="setFilter('social')" id="filter-social" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium border border-slate-200 bg-white text-slate-600 hover:bg-slate-50 transition-colors">Social</button>
            </div>

            <!-- Список звуков -->
            <div id="sounds-list" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3">
                <!-- Генерируется через JS -->
            </div>
        </div>

        <!-- Центральная часть и Плеер (снизу) -->
        <div class="flex-grow flex flex-col justify-end items-center pointer-events-none pb-2 md:pb-8">
            
            <!-- Всплывающий Плеер -->
            <div id="player-card" class="pointer-events-auto bg-white rounded-[2rem] shadow-2xl p-6 w-full max-w-lg transform transition-all duration-300 translate-y-[120%] opacity-0 border border-slate-100 relative z-30">
                
                <!-- Профессиональный таймлайн (waveform) -->
                <div id="waveform-wrapper" class="relative w-full h-16 cursor-pointer group mb-1">
                    <!-- Базовая (серая) волна -->
                    <div id="waveform-bg" class="absolute inset-0 flex items-center justify-between gap-[2px] text-slate-200"></div>
                    <!-- Активная (синяя) волна (обрезается через clip-path) -->
                    <div id="waveform-active" class="absolute inset-0 flex items-center justify-between gap-[2px] text-blue-500 pointer-events-none" style="clip-path: inset(0 100% 0 0);"></div>
                    <!-- Линия-указатель текущего времени -->
                    <div id="playhead" class="absolute top-0 bottom-0 w-[2px] bg-blue-600 rounded-full pointer-events-none shadow-[0_0_4px_rgba(59,130,246,0.5)] z-10" style="left: 0%;"></div>
                    <!-- Всплывающий таймкод при наведении -->
                    <div id="timeline-tooltip" class="absolute -top-7 -translate-x-1/2 bg-slate-800 text-white text-[10px] font-bold px-2 py-1 rounded shadow-md opacity-0 transition-opacity duration-150 pointer-events-none z-20" style="left: 0%;">0:00</div>
                    <!-- Интерактивный невидимый ползунок -->
                    <input type="range" id="audio-timeline" min="0" max="100" value="0" step="0.01" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-30 m-0" oninput="seekAudio(this.value)">
                </div>
                
                <!-- Таймкоды -->
                <div class="flex justify-between text-xs font-semibold text-slate-400 mb-4 px-1">
                    <span id="time-current">0:00</span>
                    <span id="time-total">0:00</span>
                </div>

                <div class="flex items-start gap-5">
                    <!-- Кнопка Play/Pause в плеере -->
                    <button id="main-play-btn" onclick="toggleMainPlay()" class="w-14 h-14 bg-slate-800 text-white rounded-full flex items-center justify-center hover:bg-slate-700 transition-colors flex-shrink-0 shadow-md">
                        <svg id="main-play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="translate-x-0.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        <svg id="main-pause-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="hidden"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    </button>
                    
                    <div class="flex-grow">
                        <div class="flex justify-between items-start mb-2 group">
                            <!-- Кликабельный заголовок, открывающий подробности -->
                            <h2 id="player-title" onclick="openDetailsModal()" class="text-xl font-bold text-slate-800 cursor-pointer hover:text-blue-600 transition-colors" title="Открыть подробную информацию">Название аудио</h2>
                            <!-- Кнопка (i) -->
                            <button onclick="openDetailsModal()" class="text-slate-400 hover:text-blue-600 transition-colors p-1" title="Информация о звуке">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                            </button>
                        </div>
                        
                        <!-- Теги -->
                        <div id="player-tags" class="flex flex-wrap gap-2 mb-2">
                            <!-- Теги вставляются сюда -->
                        </div>
                        
                        <p id="player-gear" class="text-xs text-slate-400 font-medium mt-1">Rec: Загрузка...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Кнопка Добавления звука (Плавающая) -->
        <div class="absolute bottom-6 right-6 md:bottom-10 md:right-10 pointer-events-auto z-20">
            <button onclick="toggleAddModal()" class="w-14 h-14 bg-white text-slate-800 rounded-full flex items-center justify-center shadow-xl hover:shadow-2xl hover:scale-105 transition-all border border-slate-100 group">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:rotate-90 transition-transform duration-300"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
        </div>

    </div>

    <!-- Модальное окно "Add Audio" -->
    <div id="add-modal" class="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md max-h-[90vh] flex flex-col overflow-hidden transform scale-95 transition-transform duration-300" id="add-modal-content">
            
            <!-- Шапка модалки -->
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-lg font-bold">Add Audio</h3>
                <button onclick="toggleAddModal()" class="text-slate-400 hover:text-slate-600"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>

            <!-- Форма -->
            <div class="p-6 overflow-y-auto custom-scrollbar flex flex-col gap-5">
                <!-- Drag and drop zone -->
                <div class="bg-slate-50 border-2 border-dashed border-slate-200 rounded-xl p-8 flex flex-col items-center justify-center text-center cursor-pointer hover:bg-slate-100 transition-colors">
                    <svg class="text-slate-400 mb-2" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <p class="text-sm font-medium text-slate-600 mb-2">Drag-and-drop zone.</p>
                    <p class="text-xs text-slate-400 mt-2">File_name.wav</p>
                </div>

                <!-- Поля ввода -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Display Title</label>
                    <input type="text" placeholder="e.g., Central Market Morning" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Sound Description</label>
                    <textarea rows="3" placeholder="Describe the soundscape..." class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
                </div>

                <!-- Location & Date -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-3">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">Location</label>
                            <input type="text" value="Rostov Region" class="w-full border border-slate-300 rounded-lg px-2 py-1 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">Date</label>
                            <input type="date" value="2023-10-01" class="w-full border border-slate-300 rounded-lg px-2 py-1 text-sm text-slate-600">
                        </div>
                    </div>
                    <div class="flex flex-col gap-3">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">Recorder Model</label>
                            <input type="text" class="w-full border border-slate-300 rounded-lg px-3 py-1 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">Microphone Type</label>
                            <input type="text" class="w-full border border-slate-300 rounded-lg px-3 py-1 text-sm">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Футер модалки -->
            <div class="p-4 border-t border-slate-100 bg-slate-50">
                <button onclick="toggleAddModal(); alert('Функция загрузки будет реализована в серверной части проекта.');" class="w-full py-3 bg-white border border-slate-200 text-slate-800 font-semibold rounded-xl shadow-sm hover:bg-slate-50 transition-colors">
                    Publish Sound
                </button>
            </div>
        </div>
    </div>

    <!-- Модальное окно "Страница звука" (Детали) -->
    <div id="details-modal" class="fixed inset-0 z-[60] bg-slate-900/60 backdrop-blur-md hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden transform scale-95 transition-transform duration-300" id="details-modal-content">
            
            <!-- Шапка с картинкой -->
            <div class="relative h-48 md:h-64 shrink-0 bg-slate-200">
                <img id="details-image" src="" alt="Фотография места" class="w-full h-full object-cover" onerror="this.src='https://picsum.photos/800/500?random=fallback'">
                <!-- Градиент для читаемости кнопки закрытия -->
                <div class="absolute inset-0 bg-gradient-to-b from-black/50 to-transparent h-24"></div>
                <!-- Кнопка закрытия -->
                <button onclick="closeDetailsModal()" class="absolute top-4 right-4 w-10 h-10 bg-white/20 backdrop-blur-md text-white border border-white/30 rounded-full flex items-center justify-center hover:bg-white/40 transition-colors">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <!-- Контент страницы -->
            <div class="p-6 md:p-8 overflow-y-auto custom-scrollbar">
                
                <!-- Теги и категория -->
                <div class="flex flex-wrap gap-2 mb-4" id="details-tags-container">
                    <!-- Заполняется из JS -->
                </div>

                <!-- Заголовок, Даты и Кнопка Скачивания -->
                <div class="flex justify-between items-start mb-6 gap-4">
                    <div>
                        <h2 id="details-title" class="text-2xl md:text-3xl font-extrabold text-slate-800 leading-tight mb-2">Заголовок звука</h2>
                        <div class="flex items-center text-sm text-slate-500 font-medium gap-1.5">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                            <span id="details-date">01.01.2023</span>
                        </div>
                    </div>
                    
                    <!-- Кнопка скачивания -->
                    <a id="details-download-btn" href="#" download class="flex-shrink-0 bg-blue-600 hover:bg-blue-700 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md hover:shadow-lg transition-all hover:-translate-y-0.5" title="Скачать аудиофайл">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    </a>
                </div>
                
                <!-- Описание -->
                <div class="prose prose-slate prose-sm md:prose-base mb-8">
                    <p id="details-description" class="text-slate-600 leading-relaxed"></p>
                </div>

                <!-- Спецификации (Координаты и Оборудование) -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-50 p-5 rounded-2xl border border-slate-100">
                    <div class="flex items-start gap-3">
                        <div class="mt-1 text-blue-500">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        </div>
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">GPS Coordinates</p>
                            <p id="details-coords" class="text-sm font-semibold text-slate-700 font-mono">0.0000, 0.0000</p>
                        </div>
                    </div>
                    <div class="flex items-start gap-3">
                        <div class="mt-1 text-slate-500">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                        </div>
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Recording Gear</p>
                            <p id="details-gear" class="text-sm font-semibold text-slate-700">Оборудование</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Аудио элемент (скрытый) -->
    <audio id="global-audio"></audio>

    <script>
        // База данных звуков (50 точек по всей Ростовской области)
        const soundsData = [
            // РОСТОВ-НА-ДОНУ (10 точек)
            { id: 'r1', title: 'Набережная Дона', category: 'nature', lat: 47.2130, lng: 39.7150, duration: '1:08', url: 'https://cdn.freesound.org/previews/416/416529_5121236-lq.mp3', typeTag: 'Background', semanticTag: 'Nature', gear: 'Tascam DR-40X', date: '21 Авг 2023', description: 'Ритмичный плеск волн великой реки Дон о бетонную набережную Ростова.', image: '' },
            { id: 'r2', title: 'Центральный рынок', category: 'social', lat: 47.2173, lng: 39.7083, duration: '2:12', url: 'https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3', typeTag: 'Soundmark', semanticTag: 'Trade Identity', gear: 'Zoom F6', date: '04 Июн 2023', description: 'Пульс и торговое сердце Ростова. Шумный Старый базар утром выходного дня.', image: '' },

            { id: 'u6', title: 'Павловская крепость', category: 'nature', lat: 47.2800, lng: 38.8500, duration: '1:30', url: 'https://cdn.freesound.org/previews/416/416529_5121236-lq.mp3', typeTag: 'Ambiance', semanticTag: 'Heritage', gear: 'Zoom H5', date: '11 Май 2023', description: 'Полная тишина степи, ковыль на ветру над остатками земляных редутов Петра I.', image: '' },
            { id: 'u7', title: 'Природный парк "Донской"', category: 'nature', lat: 47.3000, lng: 39.3500, duration: '2:15', url: 'https://cdn.freesound.org/previews/416/416529_5121236-lq.mp3', typeTag: 'Keynote', semanticTag: 'Wildlife', gear: 'Tascam DR-40X', date: '28 Июл 2023', description: 'Хор насекомых, кваканье и крики цапель в пойменных лесах Дона.', image: '' },
            { id: 'u8', title: 'Новошахтинский НЗ', category: 'industrial', lat: 47.7800, lng: 39.9000, duration: '1:10', url: 'https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3', typeTag: 'Signal', semanticTag: 'Industry', gear: 'Rode NTG4+', date: '16 Сен 2023', description: 'Технологический, ровный гул нефтеперерабатывающего завода в отдалении.', image: '' },
            { id: 'u9', title: 'Донские мустанги (Остров Водный)', category: 'nature', lat: 46.4700, lng: 42.8400, duration: '1:25', url: 'https://cdn.freesound.org/previews/416/416529_5121236-lq.mp3', typeTag: 'Soundmark', semanticTag: 'Wildlife', gear: 'Zoom F6', date: '03 Авг 2023', description: 'Фырканье и топот копыт табуна диких лошадей на изолированном острове озера Маныч.', image: '' },
            { id: 'u10', title: 'Аэропорт Платов (Закрыт)', category: 'industrial', lat: 47.4900, lng: 39.9200, duration: '1:00', url: 'https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3', typeTag: 'Ambiance', semanticTag: 'Architecture', gear: 'Sony PCM-D100', date: '10 Ян 2023', description: 'Пугающая тишина гигантского пустого терминала современного аэропорта, гул кондиционеров.', image: '' }
        ];

        // Состояние приложения
        let map;
        let markers = {};
        let currentFilter = 'all';
        let currentPlayingId = null;
        let isPlaying = false;
        let animationFrameId = null; 
        
        const audioElement = document.getElementById('global-audio');

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            renderList();
            setupAudioEvents();
            renderWaveform();
            setupTimelineHover();
            
            // Поиск
            document.getElementById('search-input').addEventListener('input', (e) => {
                renderList(e.target.value.toLowerCase());
            });

            // Ожидаем загрузки API Яндекс Карт
            ymaps.ready(initMap);
        });

        // 1. Инициализация Карты (Яндекс Карты)
        function initMap() {
            map = new ymaps.Map('map', {
                center: [47.5, 40.8], // Координаты для обзора всей Ростовской области
                zoom: 7, 
                controls: [] 
            });

            updateMapMarkers();
        }

        // Обновление маркеров на основе текущего фильтра
        function updateMapMarkers(searchQuery = '') {
            if (!map) return;

            map.geoObjects.removeAll();
            markers = {};

            const createMarkerLayout = (colorClass, id) => {
                return ymaps.templateLayoutFactory.createClass(
                    `<div id="marker-${id}" class="w-4 h-4 md:w-5 md:h-5 custom-marker ${colorClass}"></div>`
                );
            };

            soundsData.forEach(sound => {
                if (currentFilter !== 'all' && sound.category !== currentFilter) return;
                if (searchQuery && !sound.title.toLowerCase().includes(searchQuery)) return;

                let colorClass = '';
                if (sound.category === 'nature') colorClass = 'marker-nature';
                else if (sound.category === 'industrial') colorClass = 'marker-industrial';
                else colorClass = 'marker-social';

                const placemark = new ymaps.Placemark([sound.lat, sound.lng], {}, {
                    iconLayout: createMarkerLayout(colorClass, sound.id),
                    iconShape: { type: 'Rectangle', coordinates: [[-10, -10], [10, 10]] },
                    iconOffset: [-10, -10]
                });
                
                placemark.events.add('click', () => {
                    selectSound(sound.id);
                });

                map.geoObjects.add(placemark);
                markers[sound.id] = placemark;
            });
        }

        // 2. Отрисовка списка слева
        function renderList(searchQuery = '') {
            const listContainer = document.getElementById('sounds-list');
            listContainer.innerHTML = '';

            const filteredData = soundsData.filter(sound => {
                const passFilter = currentFilter === 'all' || sound.category === currentFilter;
                const passSearch = !searchQuery || sound.title.toLowerCase().includes(searchQuery);
                return passFilter && passSearch;
            });

            if (filteredData.length === 0) {
                listContainer.innerHTML = '<p class="text-center text-slate-400 mt-10 text-sm">No sounds found</p>';
                return;
            }

            filteredData.forEach(sound => {
                const isSelected = currentPlayingId === sound.id;
                
                const item = document.createElement('div');
                item.className = `p-4 rounded-2xl border transition-all cursor-pointer flex items-center gap-4 group ${isSelected ? 'bg-slate-50 border-slate-300 shadow-sm' : 'bg-white border-slate-100 hover:border-slate-200 hover:shadow-sm'}`;
                item.onclick = () => selectSound(sound.id);

                item.innerHTML = `
                    <button class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 transition-colors ${isSelected && isPlaying ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600 group-hover:bg-slate-200'}">
                        ${isSelected && isPlaying 
                            ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
                            : '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="translate-x-0.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>'
                        }
                    </button>
                    <div class="flex-grow min-w-0">
                        <h3 class="font-semibold text-slate-800 text-sm truncate">${sound.title}</h3>
                        <p class="text-[10px] text-slate-400 mt-0.5 truncate">Type: ${sound.typeTag} | Semantics: ${sound.semanticTag}</p>
                    </div>
                    <div class="text-xs font-medium text-slate-400 whitespace-nowrap">${sound.duration}</div>
                `;
                listContainer.appendChild(item);
            });
        }

        // 3. Логика выбора и воспроизведения звука
        function selectSound(id) {
            const sound = soundsData.find(s => s.id === id);
            
            if (map) {
                map.setCenter([sound.lat, sound.lng], 15, {
                    checkZoomRange: true,
                    duration: 1000
                });
            }

            document.querySelectorAll('.custom-marker').forEach(el => el.classList.remove('selected', 'border-slate-800'));
            
            setTimeout(() => {
                const markerEl = document.getElementById(`marker-${id}`);
                if (markerEl) {
                    markerEl.classList.add('selected', 'border-slate-800');
                }
            }, 100);

            const playerCard = document.getElementById('player-card');
            playerCard.classList.remove('translate-y-[120%]', 'opacity-0');

            document.getElementById('player-title').textContent = sound.title;
            document.getElementById('player-gear').textContent = `Rec: ${sound.gear}`;
            
            document.getElementById('time-current').textContent = "0:00";
            document.getElementById('time-total').textContent = sound.duration;
            document.getElementById('audio-timeline').value = 0;
            updateWaveformProgress(0);
            
            let typeTagStyle = 'border-blue-200 text-blue-700 bg-blue-50';
            let semTagStyle = 'border-orange-200 text-orange-700 bg-orange-50';
            
            document.getElementById('player-tags').innerHTML = `
                <span class="text-xs px-2.5 py-0.5 rounded-full border ${typeTagStyle}">Type: ${sound.typeTag}</span>
                <span class="text-xs px-2.5 py-0.5 rounded-full border ${semTagStyle}">Semantics: ${sound.semanticTag}</span>
            `;

            if (currentPlayingId === id) {
                toggleMainPlay();
            } else {
                currentPlayingId = id;
                if (sound.url) {
                    audioElement.src = sound.url;
                    audioElement.play().then(() => {
                        isPlaying = true;
                        startTimelineAnimation(); 
                        updateUIState();
                    }).catch(e => {
                        console.log("Audio play prevented:", e);
                        isPlaying = false;
                        updateUIState();
                    });
                } else {
                    audioElement.pause();
                    isPlaying = false;
                    alert("Для этого звука нет аудиофайла (демо).");
                    updateUIState();
                }
            }
        }

        function toggleMainPlay() {
            if (!currentPlayingId) return;
            
            if (isPlaying) {
                audioElement.pause();
                isPlaying = false;
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
            } else {
                audioElement.play().then(() => {
                    isPlaying = true;
                    startTimelineAnimation(); 
                    updateUIState();
                }).catch(e => console.log(e));
            }
            updateUIState();
        }

        function updateUIState() {
            const playIcon = document.getElementById('main-play-icon');
            const pauseIcon = document.getElementById('main-pause-icon');

            if (isPlaying) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }

            renderList(document.getElementById('search-input').value.toLowerCase());
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function renderWaveform() {
            const waveData = [20, 25, 30, 22, 40, 55, 45, 35, 30, 25, 20, 15, 25, 45, 65, 80, 90, 75, 60, 45, 50, 40, 35, 55, 70, 65, 50, 40, 30, 45, 60, 85, 100, 80, 65, 50, 40, 35, 45, 55, 70, 60, 50, 40, 30, 25, 35, 50, 45, 30, 20, 15, 25, 40, 35, 25, 20, 15, 10, 15];
            let barsHtml = '';
            waveData.forEach(h => {
                barsHtml += `<div class="flex-1 bg-current rounded-full" style="height: ${h}%;"></div>`;
            });
            document.getElementById('waveform-bg').innerHTML = barsHtml;
            document.getElementById('waveform-active').innerHTML = barsHtml;
        }

        function setupTimelineHover() {
            const wrapper = document.getElementById('waveform-wrapper');
            const tooltip = document.getElementById('timeline-tooltip');

            wrapper.addEventListener('mousemove', (e) => {
                const rect = wrapper.getBoundingClientRect();
                let x = e.clientX - rect.left;
                x = Math.max(0, Math.min(x, rect.width)); 
                
                const percent = (x / rect.width) * 100;
                const duration = audioElement.duration || 0;
                
                tooltip.style.left = `${percent}%`;
                tooltip.textContent = formatTime((percent / 100) * duration);
                tooltip.classList.remove('opacity-0');
            });

            wrapper.addEventListener('mouseleave', () => {
                tooltip.classList.add('opacity-0');
            });
        }

        function updateWaveformProgress(progressRatio) {
            const percent = isNaN(progressRatio) ? 0 : Math.min(100, Math.max(0, progressRatio * 100));
            document.getElementById('waveform-active').style.clipPath = `inset(0 ${100 - percent}% 0 0)`;
            document.getElementById('playhead').style.left = `${percent}%`;
            
            if (audioElement.duration) {
                document.getElementById('audio-timeline').value = audioElement.currentTime;
            }
        }

        function seekAudio(value) {
            if (audioElement.duration) {
                audioElement.currentTime = value;
                document.getElementById('time-current').textContent = formatTime(value);
                updateWaveformProgress(value / audioElement.duration);
            }
        }

        function startTimelineAnimation() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            function animate() {
                if (!isPlaying) return;
                
                const current = audioElement.currentTime;
                const duration = audioElement.duration || 1;
                
                document.getElementById('time-current').textContent = formatTime(current);
                updateWaveformProgress(current / duration);
                
                animationFrameId = requestAnimationFrame(animate);
            }
            animate();
        }

        function setupAudioEvents() {
            audioElement.addEventListener('ended', () => {
                isPlaying = false;
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                updateUIState();
            });

            audioElement.addEventListener('loadedmetadata', () => {
                const duration = audioElement.duration;
                document.getElementById('time-total').textContent = formatTime(duration);
                document.getElementById('audio-timeline').max = duration;
            });
        }

        // 4. Фильтры
        function setFilter(filterType) {
            currentFilter = filterType;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-slate-800', 'text-white', 'active-filter');
                btn.classList.add('bg-white', 'text-slate-600');
            });
            const activeBtn = document.getElementById(`filter-${filterType}`);
            activeBtn.classList.remove('bg-white', 'text-slate-600');
            activeBtn.classList.add('bg-slate-800', 'text-white', 'active-filter');

            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            updateMapMarkers(searchQuery);
            renderList(searchQuery);
        }

        // 5. Модальное окно Add Audio
        function toggleAddModal() {
            const modal = document.getElementById('add-modal');
            const content = document.getElementById('add-modal-content');
            
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    content.classList.remove('scale-95');
                    content.classList.add('scale-100');
                }, 10);
            } else {
                modal.classList.add('opacity-0');
                content.classList.remove('scale-100');
                content.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }
        }

        // 6. Изменение размера левой панели (GUI Size)
        function changeGUISize(size) {
            const sidebar = document.getElementById('sidebar');
            
            sidebar.classList.remove('md:w-[320px]', 'md:w-[500px]');
            sidebar.classList.add('md:w-[400px]');
            sidebar.classList.remove('transition-all', 'duration-300');
            
            switch(size) {
                case 'small':
                    sidebar.style.zoom = '0.75'; 
                    break;
                case 'large':
                    sidebar.style.zoom = '1.3';  
                    break;
                case 'medium':
                default:
                    sidebar.style.zoom = '1';    
                    break;
            }
        }

        // 7. Скрытие / Открытие панели
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebar-toggle-btn');
            
            sidebar.classList.add('transition-all', 'duration-300');
            sidebar.classList.toggle('sidebar-hidden');
            
            if (sidebar.classList.contains('sidebar-hidden')) {
                toggleBtn.classList.remove('hidden');
                toggleBtn.classList.add('flex');
            } else {
                toggleBtn.classList.add('hidden');
                toggleBtn.classList.remove('flex');
            }
        }

        // 8. Логика модального окна "Страница звука" (Детали)
        function openDetailsModal() {
            if (!currentPlayingId) return; 

            const sound = soundsData.find(s => s.id === currentPlayingId);
            if (!sound) return;

            // Генерируем уникальное фото-заглушку на основе ID трека (или используем оригинальную картинку, если есть)
            let imageUrl = sound.image;
            if (!imageUrl || imageUrl.includes('unsplash.com')) {
                imageUrl = `https://picsum.photos/seed/${sound.id}/800/500`;
            }
            document.getElementById('details-image').src = imageUrl;
            
            document.getElementById('details-title').textContent = sound.title;
            document.getElementById('details-date').textContent = sound.date || 'Дата неизвестна';
            document.getElementById('details-description').textContent = sound.description;
            document.getElementById('details-coords').textContent = `${sound.lat.toFixed(5)}, ${sound.lng.toFixed(5)}`;
            document.getElementById('details-gear').textContent = sound.gear;
            
            const downloadBtn = document.getElementById('details-download-btn');
            downloadBtn.href = sound.url;
            downloadBtn.download = `${sound.title.replace(/\s+/g, '_')}.mp3`;

            let categoryStyle = '';
            if (sound.category === 'nature') categoryStyle = 'bg-green-100 text-green-700 border-green-200';
            else if (sound.category === 'industrial') categoryStyle = 'bg-blue-100 text-blue-700 border-blue-200';
            else categoryStyle = 'bg-orange-100 text-orange-700 border-orange-200';

            document.getElementById('details-tags-container').innerHTML = `
                <span class="text-xs px-3 py-1 rounded-full font-bold border ${categoryStyle} uppercase tracking-wider">${sound.category}</span>
                <span class="text-xs px-3 py-1 rounded-full border border-slate-200 bg-slate-50 text-slate-600">${sound.typeTag}</span>
                <span class="text-xs px-3 py-1 rounded-full border border-slate-200 bg-slate-50 text-slate-600">${sound.semanticTag}</span>
            `;

            const modal = document.getElementById('details-modal');
            const content = document.getElementById('details-modal-content');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);
        }

        function closeDetailsModal() {
            const modal = document.getElementById('details-modal');
            const content = document.getElementById('details-modal-content');
            
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

    </script>
