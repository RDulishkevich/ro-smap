<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Аудиокарта Ростовской области</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- API Яндекс Карт -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=ваш_api_ключ_яндекс&lang=ru_RU" type="text/javascript"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            background-color: #f0f4f8;
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        [class*="gototech"] { display: none !important; }

        /* Маркеры */
        .custom-marker {
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .custom-marker.selected {
            transform: scale(1.3);
            z-index: 1000 !important;
            border-color: #1e293b;
        }
        .marker-nature { background-color: #22c55e; }
        .marker-industrial { background-color: #3b82f6; }
        .marker-social { background-color: #f97316; }

        /* Скрытие боковой панели */
        .sidebar-hidden {
            transform: translateX(-110%) !important;
            opacity: 0 !important;
            pointer-events: none;
        }

        #sidebar {
            transform-origin: left top;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }

        /* Анимация плеера */
        #player-card {
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
        }

        /* Полоска-индикатор для скрытия */
        .drag-handle {
            width: 40px;
            height: 4px;
            background-color: #e2e8f0;
            border-radius: 2px;
            transition: background-color 0.2s;
        }
        .drag-zone:hover .drag-handle {
            background-color: #cbd5e1;
        }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <!-- Карта -->
    <div id="map" class="absolute inset-0 z-0"></div>

    <!-- UI -->
    <div class="absolute inset-0 pointer-events-none z-10 flex flex-col md:flex-row p-4 md:p-6 gap-4 overflow-hidden h-full">
        
        <!-- Кнопка открытия (бургер) -->
        <button id="sidebar-toggle-btn" onclick="toggleSidebar()" class="absolute top-4 left-4 md:top-6 md:left-6 z-20 w-12 h-12 bg-white/95 backdrop-blur-xl rounded-2xl shadow-xl border border-slate-100 flex items-center justify-center text-slate-800 hover:bg-slate-50 transition-all cursor-pointer pointer-events-auto">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <!-- Левая панель - скрыта по умолчанию через атрибут class -->
        <div id="sidebar" class="sidebar-hidden pointer-events-auto relative w-full md:w-[400px] bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl flex flex-col h-[55vh] md:h-full flex-shrink-0 border border-slate-100 overflow-hidden z-30">

            <div class="p-6 pb-4">
                <div class="flex justify-between items-start mb-1">
                    <h1 class="text-2xl font-bold tracking-tight">Ростовская область</h1>
                    
                    <div class="flex items-center gap-3">
                        <div class="hidden md:flex flex-col items-end">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">GUI Size</label>
                            <select onchange="changeGUISize(this.value)" class="text-xs bg-slate-100 border border-slate-200 rounded-lg px-2 py-1.5 text-slate-600 focus:outline-none cursor-pointer hover:bg-slate-200 transition-colors">
                                <option value="small">Small</option>
                                <option value="medium" selected>Medium</option>
                                <option value="large">Large</option>
                            </select>
                        </div>
                        
                        <button onclick="toggleSidebar()" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 transition-colors pointer-events-auto">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                </div>
                <p class="text-slate-500 font-medium mb-5">Audio Map</p>
                
                <div class="relative">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" id="search-input" placeholder="Поиск звуков..." class="w-full bg-slate-100 rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-slate-300">
                </div>
            </div>

            <div class="px-6 pb-2 overflow-x-auto hide-scrollbar flex gap-2">
                <button onclick="setFilter('all')" id="filter-all" class="filter-btn active-filter px-4 py-1.5 rounded-full text-sm font-medium border border-slate-200 bg-slate-800 text-white transition-colors">All</button>
                <button onclick="setFilter('nature')" id="filter-nature" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium border border-slate-200 bg-white text-slate-600">Nature</button>
                <button onclick="setFilter('industrial')" id="filter-industrial" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium border border-slate-200 bg-white text-slate-600">Industrial</button>
                <button onclick="setFilter('social')" id="filter-social" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium border border-slate-200 bg-white text-slate-600">Social</button>
            </div>

            <div id="sounds-list" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3"></div>
        </div>

        <!-- Плеер -->
        <div class="flex-grow flex flex-col justify-end items-center pointer-events-none pb-4 md:pb-8 w-full h-full overflow-hidden">
            
            <div id="player-card" class="pointer-events-auto bg-white rounded-[2rem] shadow-[0_-10px_40px_rgba(0,0,0,0.15)] p-4 md:p-6 w-[94%] md:w-full max-w-lg transform translate-y-[150%] opacity-0 border border-slate-100 relative z-30 mb-20 md:mb-0">
                
                <!-- Полоска для скрытия (вместо крестика) -->
                <div onclick="closePlayerCard()" class="drag-zone absolute top-0 left-0 right-0 h-8 flex justify-center items-center cursor-pointer z-40" title="Скрыть плеер">
                    <div class="drag-handle"></div>
                </div>

                <div id="waveform-wrapper" class="relative w-full h-10 md:h-14 cursor-pointer group mb-1 mt-4">
                    <div id="waveform-bg" class="absolute inset-0 flex items-center justify-between gap-[2px] text-slate-200"></div>
                    <div id="waveform-active" class="absolute inset-0 flex items-center justify-between gap-[2px] text-blue-500 pointer-events-none" style="clip-path: inset(0 100% 0 0);"></div>
                    <div id="playhead" class="absolute top-0 bottom-0 w-[2px] bg-blue-600 rounded-full pointer-events-none z-10" style="left: 0%;"></div>
                    <input type="range" id="audio-timeline" min="0" max="100" value="0" step="0.01" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-30 m-0" oninput="seekAudio(this.value)">
                </div>
                
                <div class="flex justify-between text-[10px] md:text-xs font-semibold text-slate-400 mb-3 px-1">
                    <span id="time-current">0:00</span>
                    <span id="time-total">0:00</span>
                </div>

                <div class="flex items-center gap-4">
                    <button id="main-play-btn" onclick="toggleMainPlay()" class="w-12 h-12 md:w-14 md:h-14 bg-slate-800 text-white rounded-full flex items-center justify-center hover:bg-slate-700 transition-colors shadow-md flex-shrink-0">
                        <svg id="main-play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="translate-x-0.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        <svg id="main-pause-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="hidden"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    </button>
                    
                    <div class="flex-grow min-w-0">
                        <div class="flex items-center mb-0.5">
                            <h2 id="player-title" onclick="openDetailsModal()" class="text-base md:text-xl font-bold text-slate-800 cursor-pointer hover:text-blue-600 transition-colors truncate pr-2">Название</h2>
                            <button onclick="openDetailsModal()" class="text-slate-400 hover:text-blue-600 flex-shrink-0">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                            </button>
                        </div>
                        <div id="player-tags" class="flex flex-wrap gap-1.5 mb-1"></div>
                        <p id="player-gear" class="text-[10px] md:text-xs text-slate-400 truncate font-medium">Rec: ...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Кнопка Плюс (мобильная версия - сверху справа) -->
        <div id="add-audio-btn" class="absolute top-4 right-4 md:top-auto md:bottom-10 md:right-10 pointer-events-auto z-20">
            <button onclick="toggleAddModal()" class="w-12 h-12 md:w-14 md:h-14 bg-white text-slate-800 rounded-full flex items-center justify-center shadow-xl hover:shadow-2xl border border-slate-100 hover:scale-105 transition-transform active:scale-95">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
        </div>

    </div>

    <!-- Модальные окна -->
    <div id="add-modal" class="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md max-h-[90vh] flex flex-col overflow-hidden" id="add-modal-content">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-lg font-bold">Добавить аудио</h3>
                <button onclick="toggleAddModal()" class="text-slate-400 hover:text-slate-600"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div class="p-6 overflow-y-auto flex flex-col gap-4">
                <div class="bg-slate-50 border-2 border-dashed border-slate-200 rounded-xl p-8 text-center cursor-pointer hover:bg-slate-100 transition-colors">
                    <p class="text-sm font-medium text-slate-600">Перетащите файл сюда</p>
                </div>
                <input type="text" placeholder="Название места" class="w-full border rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <textarea placeholder="Описание" class="w-full border rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none h-24 resize-none"></textarea>
            </div>
            <div class="p-4 border-t bg-slate-50">
                <button onclick="toggleAddModal();" class="w-full py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 transition-colors">Опубликовать</button>
            </div>
        </div>
    </div>

    <div id="details-modal" class="fixed inset-0 z-[60] bg-slate-900/60 backdrop-blur-md hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col overflow-hidden" id="details-modal-content">
            <div class="relative h-48 md:h-64 shrink-0 bg-slate-200">
                <img id="details-image" src="" class="w-full h-full object-cover">
                <button onclick="closeDetailsModal()" class="absolute top-4 right-4 w-10 h-10 bg-black/20 backdrop-blur-md text-white rounded-full flex items-center justify-center hover:bg-black/40 transition-colors"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div class="p-6 md:p-8 overflow-y-auto">
                <div id="details-tags-container" class="flex flex-wrap gap-2 mb-4"></div>
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h2 id="details-title" class="text-2xl md:text-3xl font-bold text-slate-800"></h2>
                        <span id="details-date" class="text-sm text-slate-500 font-medium"></span>
                    </div>
                    <a id="details-download-btn" href="#" download class="bg-blue-600 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md hover:bg-blue-700 transition-all"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></a>
                </div>
                <p id="details-description" class="text-slate-600 leading-relaxed mb-6"></p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-50 p-5 rounded-2xl border border-slate-100">
                    <p class="text-xs font-mono text-slate-500" id="details-coords"></p>
                    <p class="text-xs text-slate-500" id="details-gear"></p>
                </div>
            </div>
        </div>
    </div>

    <audio id="global-audio"></audio>

    <script>
        const soundsData = [
            { id: 'r1', title: 'Набережная Дона', category: 'nature', lat: 47.2130, lng: 39.7150, duration: '1:08', url: 'https://cdn.freesound.org/previews/416/416529_5121236-lq.mp3', typeTag: 'Background', semanticTag: 'Nature', gear: 'Tascam DR-40X', date: '21 Авг 2023', description: 'Ритмичный плеск волн великой реки Дон о бетонную набережную Ростова.' },
            { id: 'r2', title: 'Центральный рынок', category: 'social', lat: 47.2173, lng: 39.7083, duration: '2:12', url: 'https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3', typeTag: 'Soundmark', semanticTag: 'Trade Identity', gear: 'Zoom F6', date: '04 Июн 2023', description: 'Пульс и торговое сердце Ростова. Шумный Старый базар утром выходного дня.' },
            { id: 'r3', title: 'Завод Ростсельмаш', category: 'industrial', lat: 47.2600, lng: 39.7600, duration: '0:45', url: 'https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3', typeTag: 'Signal', semanticTag: 'Industry', gear: 'Rode NTG4+', date: '15 Сен 2023', description: 'Индустриальный звуковой ландшафт около гиганта отечественного машиностроения.' },
            { id: 'r4', title: 'Парк Горького', category: 'nature', lat: 47.2210, lng: 39.7020, duration: '1:45', url: 'https://cdn.freesound.org/previews/416/416529_5121236-lq.mp3', typeTag: 'Keynote', semanticTag: 'Leisure', gear: 'Zoom H5', date: '12 Май 2023', description: 'Спокойная атмосфера центрального парка, пение утренних птиц.' },
            { id: 't1', title: 'Домик А.П. Чехова', category: 'social', lat: 47.2100, lng: 38.9280, duration: '0:55', url: 'https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3', typeTag: 'Keynote', semanticTag: 'History', gear: 'Tascam DR-40X', date: '20 Май 2023', description: 'Скрип старых половиц и тихие голоса экскурсоводов в мемориальном музее.' },
            { id: 'n1', title: 'Вознесенский собор', category: 'social', lat: 47.4140, lng: 40.1105, duration: '2:30', url: 'https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3', typeTag: 'Soundmark', semanticTag: 'Religion', gear: 'Zoom H5', date: '07 Янв 2023', description: 'Мощный, раскатистый колокольный звон третьего по величине храма России.' },
            { id: 'v2', title: 'Набережная Вёшенской', category: 'nature', lat: 49.6250, lng: 41.7300, duration: '1:45', url: 'https://cdn.freesound.org/previews/416/416529_5121236-lq.mp3', typeTag: 'Keynote', semanticTag: 'Nature', gear: 'Tascam DR-40X', date: '11 Июн 2023', description: 'Сильное течение Верхнего Дона, омывающее песчаные косы.' },
            { id: 'w1', title: 'Цимлянское море', category: 'nature', lat: 47.5300, lng: 42.1500, duration: '2:00', url: 'https://cdn.freesound.org/previews/416/416529_5121236-lq.mp3', typeTag: 'Keynote', semanticTag: 'Marine', gear: 'Zoom H5', date: '11 Авг 2023', description: 'Шум прибоя Цимлянского водохранилища.' },
            { id: 'u3', title: 'Маяк в Мержаново', category: 'nature', lat: 47.2850, lng: 39.1550, duration: '1:40', url: 'https://cdn.freesound.org/previews/416/416529_5121236-lq.mp3', typeTag: 'Keynote', semanticTag: 'Landscape', gear: 'Rode NTG4+', date: '25 Сен 2023', description: 'Свист степного ветра на высоком обрыве над заливом.' }
        ];

        let map;
        let markers = {};
        let currentFilter = 'all';
        let currentPlayingId = null;
        let isPlaying = false;
        let animationFrameId = null; 
        
        const audioElement = document.getElementById('global-audio');

        document.addEventListener('DOMContentLoaded', () => {
            renderList();
            setupAudioEvents();
            renderWaveform();
            setupTimelineHover();
            
            document.getElementById('search-input').addEventListener('input', (e) => {
                renderList(e.target.value.toLowerCase());
            });

            ymaps.ready(initMap);
        });

        function initMap() {
            map = new ymaps.Map('map', {
                center: [47.5, 40.8],
                zoom: 7, 
                controls: [] 
            });
            updateMapMarkers();
        }

        function updateMapMarkers(searchQuery = '') {
            if (!map) return;
            map.geoObjects.removeAll();
            markers = {};

            const createMarkerLayout = (colorClass, id) => {
                const isSel = currentPlayingId === id;
                return ymaps.templateLayoutFactory.createClass(
                    `<div id="marker-${id}" class="w-4 h-4 md:w-5 md:h-5 custom-marker ${colorClass} ${isSel ? 'selected' : ''}"></div>`
                );
            };

            soundsData.forEach(sound => {
                if (currentFilter !== 'all' && sound.category !== currentFilter) return;
                if (searchQuery && !sound.title.toLowerCase().includes(searchQuery)) return;

                let colorClass = sound.category === 'nature' ? 'marker-nature' : sound.category === 'industrial' ? 'marker-industrial' : 'marker-social';

                const placemark = new ymaps.Placemark([sound.lat, sound.lng], {}, {
                    iconLayout: createMarkerLayout(colorClass, sound.id),
                    iconShape: { type: 'Rectangle', coordinates: [[-10, -10], [10, 10]] },
                    iconOffset: [-10, -10]
                });
                
                placemark.events.add('click', () => selectSound(sound.id));
                map.geoObjects.add(placemark);
                markers[sound.id] = placemark;
            });
        }

        function renderList(searchQuery = '') {
            const listContainer = document.getElementById('sounds-list');
            listContainer.innerHTML = '';
            const filtered = soundsData.filter(s => (currentFilter === 'all' || s.category === currentFilter) && (!searchQuery || s.title.toLowerCase().includes(searchQuery)));

            filtered.forEach(sound => {
                const isSelected = currentPlayingId === sound.id;
                const item = document.createElement('div');
                item.className = `p-4 rounded-2xl border transition-all cursor-pointer flex items-center gap-4 group ${isSelected ? 'bg-slate-50 border-slate-300 shadow-sm' : 'bg-white border-slate-100 hover:border-slate-200'}`;
                item.onclick = () => selectSound(sound.id);
                item.innerHTML = `
                    <button class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 transition-colors ${isSelected && isPlaying ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600'}">
                        ${isSelected && isPlaying ? '<svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>' : '<svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>'}
                    </button>
                    <div class="flex-grow min-w-0">
                        <h3 class="font-semibold text-sm truncate text-slate-800">${sound.title}</h3>
                        <p class="text-[10px] text-slate-400 mt-0.5 truncate uppercase tracking-wider font-bold">${sound.category}</p>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        function selectSound(id) {
            const sound = soundsData.find(s => s.id === id);
            
            // Авто-скрытие панели на мобильных
            if (window.innerWidth < 768) {
                const sidebar = document.getElementById('sidebar');
                if (!sidebar.classList.contains('sidebar-hidden')) toggleSidebar();
            }

            map.setCenter([sound.lat, sound.lng], 15, { duration: 1000 });
            
            currentPlayingId = id;
            updateMapMarkers(document.getElementById('search-input').value.toLowerCase());

            const card = document.getElementById('player-card');
            card.classList.remove('translate-y-[150%]', 'opacity-0');

            document.getElementById('player-title').textContent = sound.title;
            document.getElementById('player-gear').textContent = `Rec: ${sound.gear}`;
            
            let typeTagStyle = 'border-blue-200 text-blue-700 bg-blue-50';
            let semTagStyle = 'border-orange-200 text-orange-700 bg-orange-50';
            document.getElementById('player-tags').innerHTML = `
                <span class="text-[9px] px-2 py-0.5 rounded-full border ${typeTagStyle}">${sound.typeTag}</span>
                <span class="text-[9px] px-2 py-0.5 rounded-full border ${semTagStyle}">${sound.semanticTag}</span>
            `;

            if (audioElement.src !== sound.url) {
                audioElement.src = sound.url;
                audioElement.play().then(() => {
                    isPlaying = true;
                    startTimelineAnimation();
                    updateUIState();
                }).catch(() => {
                    isPlaying = false;
                    updateUIState();
                });
            } else {
                toggleMainPlay();
            }
        }

        function closePlayerCard() {
            if (isPlaying) {
                audioElement.pause();
                isPlaying = false;
                cancelAnimationFrame(animationFrameId);
            }
            document.getElementById('player-card').classList.add('translate-y-[150%]', 'opacity-0');
            currentPlayingId = null;
            updateMapMarkers();
            renderList();
        }

        function toggleMainPlay() {
            if (!currentPlayingId) return;
            if (isPlaying) {
                audioElement.pause();
                isPlaying = false;
                cancelAnimationFrame(animationFrameId);
            } else {
                audioElement.play().then(() => {
                    isPlaying = true;
                    startTimelineAnimation();
                });
            }
            updateUIState();
        }

        function updateUIState() {
            const playIcon = document.getElementById('main-play-icon');
            const pauseIcon = document.getElementById('main-pause-icon');
            if (isPlaying) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
            renderList(document.getElementById('search-input').value.toLowerCase());
        }

        function renderWaveform() {
            const waveData = [20, 40, 60, 30, 80, 50, 90, 70, 40, 20, 50, 80, 100, 60, 40, 20, 30, 50, 70, 90, 60, 40, 20, 30, 50, 70, 10, 40, 60, 80, 20, 50, 70, 40, 20, 60];
            let html = '';
            waveData.forEach(h => html += `<div class="flex-1 bg-current rounded-full" style="height: ${h}%;"></div>`);
            document.getElementById('waveform-bg').innerHTML = html;
            document.getElementById('waveform-active').innerHTML = html;
        }

        function startTimelineAnimation() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            const animate = () => {
                if (!isPlaying) return;
                const ratio = audioElement.currentTime / (audioElement.duration || 1);
                document.getElementById('time-current').textContent = formatTime(audioElement.currentTime);
                document.getElementById('waveform-active').style.clipPath = `inset(0 ${100 - ratio * 100}% 0 0)`;
                document.getElementById('playhead').style.left = `${ratio * 100}%`;
                animationFrameId = requestAnimationFrame(animate);
            };
            animate();
        }

        function seekAudio(val) {
            if (audioElement.duration) {
                audioElement.currentTime = (val / 100) * audioElement.duration;
                if (!isPlaying) {
                    const ratio = val / 100;
                    document.getElementById('waveform-active').style.clipPath = `inset(0 ${100 - ratio * 100}% 0 0)`;
                    document.getElementById('playhead').style.left = `${ratio * 100}%`;
                    document.getElementById('time-current').textContent = formatTime(audioElement.currentTime);
                }
            }
        }

        function formatTime(s) {
            const min = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function setupAudioEvents() {
            audioElement.onended = () => {
                isPlaying = false;
                updateUIState();
            };
            audioElement.onloadedmetadata = () => {
                document.getElementById('time-total').textContent = formatTime(audioElement.duration);
            };
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const btn = document.getElementById('sidebar-toggle-btn');
            sidebar.classList.toggle('sidebar-hidden');
            btn.classList.toggle('hidden', !sidebar.classList.contains('sidebar-hidden'));
        }

        function changeGUISize(size) {
            const sidebar = document.getElementById('sidebar');
            const scales = { small: '0.8', medium: '1', large: '1.2' };
            sidebar.style.transform = `scale(${scales[size]})`;
        }

        function setFilter(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => {
                if (b.id === `filter-${type}`) {
                    b.classList.add('bg-slate-800', 'text-white');
                    b.classList.remove('bg-white', 'text-slate-600');
                } else {
                    b.classList.remove('bg-slate-800', 'text-white');
                    b.classList.add('bg-white', 'text-slate-600');
                }
            });
            updateMapMarkers();
            renderList();
        }

        function toggleAddModal() {
            const m = document.getElementById('add-modal');
            const content = document.getElementById('add-modal-content');
            if (m.classList.contains('hidden')) {
                m.classList.remove('hidden');
                setTimeout(() => m.classList.remove('opacity-0'), 10);
            } else {
                m.classList.add('opacity-0');
                setTimeout(() => m.classList.add('hidden'), 300);
            }
        }

        function openDetailsModal() {
            const s = soundsData.find(x => x.id === currentPlayingId);
            if (!s) return;
            document.getElementById('details-image').src = `https://picsum.photos/seed/${s.id}/800/500`;
            document.getElementById('details-title').textContent = s.title;
            document.getElementById('details-date').textContent = s.date;
            document.getElementById('details-description').textContent = s.description;
            document.getElementById('details-coords').textContent = `Координаты: ${s.lat.toFixed(4)}, ${s.lng.toFixed(4)}`;
            document.getElementById('details-gear').textContent = `Оборудование: ${s.gear}`;
            
            const tagsCont = document.getElementById('details-tags-container');
            tagsCont.innerHTML = `<span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold uppercase">${s.category}</span>`;
            
            const m = document.getElementById('details-modal');
            m.classList.remove('hidden');
            setTimeout(() => m.classList.remove('opacity-0'), 10);
        }

        function closeDetailsModal() {
            const m = document.getElementById('details-modal');
            m.classList.add('opacity-0');
            setTimeout(() => m.classList.add('hidden'), 300);
        }

        function setupTimelineHover() {
            const wrapper = document.getElementById('waveform-wrapper');
            const tooltip = document.getElementById('timeline-tooltip');
            wrapper.addEventListener('mousemove', (e) => {
                const rect = wrapper.getBoundingClientRect();
                const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
                const pct = x / rect.width;
                tooltip.style.left = `${pct * 100}%`;
                tooltip.textContent = formatTime(pct * (audioElement.duration || 0));
                tooltip.classList.remove('opacity-0');
            });
            wrapper.addEventListener('mouseleave', () => tooltip.classList.add('opacity-0'));
        }
    </script>
</body>
</html>
